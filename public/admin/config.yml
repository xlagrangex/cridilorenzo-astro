backend:
  name: github
  repo: xlagrangex/cridilorenzo-astro
  branch: main
  base_url: https://cridilorenzo.com
  auth_endpoint: /api/auth

media_folder: "public/images/blog"
public_folder: "/images/blog"

locale: "it"

slug:
  encoding: "ascii"
  clean_accents: true

collections:
  - name: "blog"
    label: "Blog"
    label_singular: "Articolo"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    sortable_fields: ["date", "title"]
    summary: "{{title}} — {{date}}"
    editor:
      preview: false
    fields:
      - { label: "Titolo (H1)", name: "title", widget: "string", hint: "Il titolo principale dell'articolo. Sarà il tag H1 della pagina." }
      - { label: "Descrizione SEO", name: "description", widget: "text", hint: "150-160 caratteri. Appare nei risultati Google e nelle condivisioni social." }
      - { label: "Data pubblicazione", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Immagine in evidenza", name: "image", widget: "image", required: false, hint: "Immagine principale dell'articolo. Rapporto 16:9 consigliato, minimo 1200x630px." }
      - { label: "Tag", name: "tags", widget: "list", required: false, hint: "Separati da virgola. Es: counseling, crescita personale, sogni" }
      - { label: "Bozza", name: "draft", widget: "boolean", default: false, required: false }
      - { label: "Contenuto", name: "body", widget: "markdown", hint: "Usa H2 per le sezioni principali, H3 per le sottosezioni. L'indice viene generato automaticamente." }

  - name: "contatti"
    label: "Contatti ricevuti"
    label_singular: "Contatto"
    folder: "src/content/contatti"
    create: false
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    sortable_fields: ["date", "name"]
    summary: "{{name}} — {{email}} — {{date}}"
    editor:
      preview: false
    fields:
      - { label: "Nome", name: "name", widget: "string" }
      - { label: "Email", name: "email", widget: "string" }
      - { label: "Telefono", name: "phone", widget: "string", required: false }
      - { label: "Data", name: "date", widget: "datetime" }
      - { label: "Letto", name: "read", widget: "boolean", default: false }
      - { label: "Messaggio", name: "body", widget: "markdown" }
