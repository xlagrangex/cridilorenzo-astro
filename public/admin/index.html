<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Admin — Christian DiLorenzo</title>
  <style>
    .login-overlay { position: fixed; inset: 0; background: #f4f2ee; z-index: 99999; display: flex; align-items: center; justify-content: center; font-family: system-ui, sans-serif; }
    .login-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); text-align: center; max-width: 360px; width: 100%; }
    .login-box h1 { font-size: 1.5rem; font-weight: 500; margin-bottom: 8px; color: #15141a; }
    .login-box p { color: #929292; font-size: 0.9rem; margin-bottom: 20px; }
    .login-box input { width: 100%; padding: 12px 16px; border: 1px solid #e4e4e4; border-radius: 10px; font-size: 1rem; margin-bottom: 12px; background: #f4f2ee; box-sizing: border-box; }
    .login-box input:focus { outline: none; border-color: #2a9d8f; }
    .login-box button { width: 100%; padding: 14px; background: #2a9d8f; color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .login-box button:hover { background: #238b7f; }
    .login-error { color: #e53e3e; font-size: 0.85rem; margin-bottom: 12px; display: none; }
  </style>
</head>
<body>

  <div class="login-overlay" id="login-overlay">
    <div class="login-box">
      <h1>Admin</h1>
      <p>Inserisci la password per accedere.</p>
      <div class="login-error" id="login-error">Password errata</div>
      <form id="login-form">
        <input type="password" id="login-pass" placeholder="Password" autofocus />
        <button type="submit">Accedi</button>
      </form>
    </div>
  </div>

  <script>
    var savedToken = localStorage.getItem("cms_token");
    if (savedToken) {
      injectAndLoad(savedToken);
    }

    document.getElementById("login-form").addEventListener("submit", async function(e) {
      e.preventDefault();
      var pass = document.getElementById("login-pass").value;
      var res = await fetch("/api/auth", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: pass })
      });
      if (res.ok) {
        var data = await res.json();
        localStorage.setItem("cms_token", data.token);
        injectAndLoad(data.token);
      } else {
        document.getElementById("login-error").style.display = "block";
      }
    });

    function injectAndLoad(token) {
      document.getElementById("login-overlay").style.display = "none";

      // Decap CMS usa "netlify-cms-user" in localStorage per saltare il login
      localStorage.setItem("netlify-cms-user", JSON.stringify({
        token: token,
        name: "Admin",
        login: "admin",
        avatar_url: "",
        backendName: "github"
      }));

      // Carica Decap CMS (non Sveltia — Decap rispetta il token in localStorage)
      var s = document.createElement("script");
      s.src = "https://unpkg.com/decap-cms@^3.3.3/dist/decap-cms.js";
      document.body.appendChild(s);
    }
  </script>
</body>
</html>
